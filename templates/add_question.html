<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Question | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/add_question.css">
    
</head>

<body>

  <div class="bg-pattern"></div>

  <main>
    <span class="qz-logo aq-brand"><i class="fas fa-shapes"></i> Quizzer <span class="admin-pill">Admin</span></span>
    <h1><i class="fas fa-circle-plus"></i> Add New Question</h1>

    <form id="questionForm" method="POST" action="/add_question">
      <div>
        <label for="faculty">Select Faculty</label>
        <select id="faculty" name="faculty" required>
          <option value="" disabled selected>-- Select Faculty --</option>
          <option value="science_tech">Science and Technology</option>
          <option value="management">Management</option>
        </select>
      </div>

      <div>
        <label for="course">Select Course</label>
        <select id="course" name="course" required>
          <option value="" disabled selected>-- Select Course --</option>
        </select>
      </div>
      
      <div>
        <label for="semester">Select Semester</label>
        <select id="semester" name="semester" required>
          <option value="" disabled selected>-- Select Semester --</option>
          <script>
            for(let i=1;i<=8;i++) { document.write(`<option value="${i}">Semester ${i}</option>`); }
          </script>
        </select>
      </div>

      <div>
        <label for="quizLevel">Quiz Level</label>
        <select id="quizLevel" name="quizLevel" required>
          <option value="" disabled selected>-- Choose Level --</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div>
        <label for="questionText">Question</label>
        <textarea id="questionText" name="questionText" rows="3" placeholder="Enter the question here..." required></textarea>
      </div>

      <fieldset>
        <legend>Answer Choices</legend>
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            <input type="radio" name="correctAnswer" value="choice1" required />
            <input type="text" name="choice1" placeholder="Choice 1" required />
          </div>
          <div class="flex items-center gap-2">
            <input type="radio" name="correctAnswer" value="choice2" />
            <input type="text" name="choice2" placeholder="Choice 2" required />
          </div>
          <div class="flex items-center gap-2">
            <input type="radio" name="correctAnswer" value="choice3" />
            <input type="text" name="choice3" placeholder="Choice 3" required />
          </div>
          <div class="flex items-center gap-2">
            <input type="radio" name="correctAnswer" value="choice4" />
            <input type="text" name="choice4" placeholder="Choice 4" required />
          </div>
        </div>
      </fieldset>

      <div class="flex justify-between pt-4">
        <button type="button" onclick="window.location.href='admin'" class="btn btn-gray"><i class="fas fa-arrow-left"></i> Go Back</button>
        <div class="flex gap-4">
          <button type="reset" class="btn btn-gray"><i class="fas fa-rotate-left"></i> Reset</button>
          <button type="submit" class="btn btn-danger"><i class="fas fa-check"></i> Add Question</button>
        </div>
      </div>
    </form>
  </main>

  <script src="/static/js/add_question.js">
   
  </script>

</body>
</html>
