<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/forgot_password.css">
</head>
<body>

<div class="bg-pattern"></div>

<div class="container">
  <a href="{{ url_for('login') }}" class="qz-logo auth-logo"><i class="fas fa-shapes"></i> Quizzer</a>
  <h2>Forgot Password</h2>
  <p class="auth-sub">We'll email you a one-time code to reset it.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <input type="email" name="email" placeholder="Enter your email" required>
    <button type="submit"><i class="fas fa-paper-plane"></i> Send OTP</button>
  </form>

  <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back to Login</button>
</div>

<script src="/static/js/forgot_password.js">

</script>

</body>
</html>
