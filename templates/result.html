<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Result</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/result.css">
</head>
<body>
  <div class="bg-pattern"></div>

  <div class="result-card fade-in">
    <span class="qz-logo result-brand"><i class="fas fa-shapes"></i> Quizzer</span>
    <div class="result-badge"><i class="fas fa-trophy"></i></div>
    <h1>Quiz Completed!</h1>
    <p class="username">Hi, {{ username }}!</p>
    <p class="score">Your Score: {{ score }}</p>

    <a href="{{ url_for('student_dashboard') }}" class="btn btn-purple"><i class="fas fa-house"></i> Back to Dashboard</a>
    <a href="becomputer" class="btn btn-blue"><i class="fas fa-rotate-right"></i> Play Another Level</a>
  </div>
<script src="/static/js/result.js"></script>
</body>
</html>
