<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/static/css/theme.css">
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: var(--font-body);
}

html, body {
    height: 100%;
    width: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(160deg, var(--bg-1), var(--bg-2));
    position: relative;
    padding: 20px 0;
    min-height: 100vh;
    color: var(--text-primary);
}

.bg-pattern {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1.4px, transparent 1.4px);
    background-size: 26px 26px;
    pointer-events: none;
    z-index: 0;
}
.brand-mark {
    margin-bottom: 18px;
    font-size: 1.4em;
    position: relative;
    z-index: 1;
}
.container {
    background: var(--surface-strong);
    border: 1px solid var(--surface-border);
    padding: 30px 30px 25px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    text-align: center;
    width: 340px;
    max-width: 90%;
    animation: fadeInScale 0.5s ease;
    position: relative;
    z-index: 1;
}
.container h2 {
    color: var(--text-primary);
    font-family: var(--font-display);
    margin-bottom: 6px;
    font-size: 1.5rem;
}
.container .auth-sub {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 18px;
}
input {
    width: 100%;
    padding: 12px 18px;
    margin: 8px 0;
    border-radius: var(--radius-pill);
    border: 1.5px solid var(--surface-border);
    font-size: 1rem;
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
    transition: 0.25s;
    text-align: center;
    letter-spacing: 3px;
}
input::placeholder { letter-spacing: normal; color: var(--text-muted); }
input:focus {
    border-color: var(--accent-teal);
    box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
}
input.error-field {
    border-color: #ff8a8a;
    box-shadow: 0 0 0 4px rgba(255,138,138,0.15);
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: var(--radius-pill);
    cursor: pointer;
    font-weight: 700;
    font-family: var(--font-display);
    font-size: 0.95rem;
    color: #fff;
    background: linear-gradient(45deg, var(--accent-teal), var(--accent-teal-deep));
    transition: transform 0.15s, opacity 0.25s;
}
button:hover {
    opacity: 0.92;
    transform: translateY(-2px);
}
button:active {
    transform: scale(0.97);
}
button:disabled {
    background: #3a4552;
    cursor: not-allowed;
}
button.go-back {
    background: transparent;
    border: 1.5px solid var(--surface-border);
    color: var(--text-muted);
}
button.go-back:hover { background: var(--surface-border); color: var(--text-primary); }
button#resendOtpBtn {
    background: transparent;
    border: 1.5px solid var(--surface-border);
    color: var(--accent-teal);
}
button#resendOtpBtn:hover { background: var(--surface-border); }
.flash {
    margin-bottom: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    text-align: center;
}
.flash.show {
    opacity: 1;
}
.flash-success {
    background: #1f9d55;
    color: #fff;
}
.flash-danger {
    background: #e5484d;
    color: #fff;
}
.flash-info {
    background: var(--accent-teal-deep);
    color: #fff;
}
.change-email {
    margin-top: 12px;
    display: block;
    font-size: 0.85rem;
    color: var(--accent-teal);
    cursor: pointer;
    text-decoration: underline;
}
.change-email:hover {
    color: var(--brand-amber);
}
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(5,10,15,0.65);
    backdrop-filter: blur(4px);
    justify-content: center;
    align-items: center;
    overflow: auto;
}
.modal-content {
    background: var(--surface-strong);
    border: 1px solid var(--surface-border);
    padding: 22px 25px;
    border-radius: var(--radius-md);
    width: 90%;
    max-width: 360px;
    text-align: center;
    animation: fadeInScale 0.4s ease;
    position: relative;
    color: var(--text-primary);
}
.modal-content h3 { margin-bottom: 14px; font-family: var(--font-display); color: var(--text-primary); }
.modal-content input {
    letter-spacing: normal;
    text-align: left;
    border-radius: var(--radius-pill);
    margin-bottom: 14px;
}
.modal-close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--text-muted);
}
.modal-close:hover {
    color: var(--text-primary);
}
@keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.94); }
    to { opacity: 1; transform: scale(1); }
}
@media(max-width: 400px){
    .container { padding: 24px 20px; width: 90%; }
    input, button { font-size: 0.95rem; padding: 12px; }
}
</style>
</head>
<body>
<div class="bg-pattern"></div>

<span class="qz-logo brand-mark"><i class="fas fa-shapes"></i> Quizzer</span>

<div class="container">
    <h2>Enter OTP</h2>
    <p class="auth-sub">Check your inbox for the verification code.</p>
    <div id="flash-container"></div>
    <form id="otpForm" action="{{ url_for('verify_otp') }}" method="POST">
        <input type="text" name="otp" placeholder="Enter OTP" id="otpInput" autocomplete="one-time-code" inputmode="numeric">
        <button type="submit" id="verifyBtn"><i class="fas fa-check"></i> Verify OTP</button>
    </form>
    <button type="button" id="goBackBtn" class="go-back"><i class="fas fa-arrow-left"></i> Go Back</button>
    <button id="resendOtpBtn" type="button">Resend OTP</button>
    <span class="change-email" id="changeEmailBtn">Change Email</span>
</div>


<div class="modal" id="changeEmailModal">
    <div class="modal-content">
        <span class="modal-close" id="modalClose">&times;</span>
        <h3>Change Email</h3>
        <input type="email" id="newEmail" placeholder="Enter new email">
        <button id="updateEmailBtn">Update Email</button>
    </div>
</div>

<script>
document.getElementById('otpInput').focus();

function showFlash(message, category='info', duration=2000) {
    const flashDiv = document.createElement('div');
    flashDiv.classList.add('flash', `flash-${category}`);
    flashDiv.textContent = message;
    document.getElementById('flash-container').prepend(flashDiv);
    setTimeout(() => flashDiv.classList.add('show'), 10);
    setTimeout(() => { flashDiv.classList.remove('show'); setTimeout(() => flashDiv.remove(), 500); }, duration);
}

document.getElementById('otpForm').addEventListener('submit', function(e){
    e.preventDefault();
    const otp = document.getElementById('otpInput').value;
    fetch('{{ url_for("verify_otp") }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ otp })
    })
    .then(res => res.json())
    .then(data => {
        showFlash(data.msg, data.ok ? 'success' : 'danger');
        if(data.ok){ setTimeout(()=> window.location.href = "/login", 1500); }
    })
    .catch(() => showFlash("OTP verification failed!", 'danger'));
});

document.getElementById('resendOtpBtn').addEventListener('click', function(){
    const btn = this;
    btn.disabled = true; btn.textContent = 'Sending...';
    fetch('{{ url_for("resend_otp") }}', { method: 'POST', credentials: 'same-origin' })
    .then(res => res.json())
    .then(data => {
        showFlash(data.msg || 'OTP sent!', data.ok ? 'success' : 'danger');
        btn.disabled = false; btn.textContent = 'Resend OTP';
        document.getElementById('otpInput').focus();
    })
    .catch(() => {
        showFlash('Failed to resend OTP.', 'danger');
        btn.disabled = false; btn.textContent = 'Resend OTP';
    });
});

const modal = document.getElementById('changeEmailModal');
document.getElementById('changeEmailBtn').addEventListener('click', () => modal.style.display = 'flex');
document.getElementById('modalClose').addEventListener('click', () => modal.style.display = 'none');
window.addEventListener('click', e => { if(e.target === modal) modal.style.display = 'none'; });

document.getElementById('updateEmailBtn').addEventListener('click', function(){
    const btn = this;
    btn.disabled = true; btn.textContent = 'Updating...';
    const newEmail = document.getElementById('newEmail').value.trim();
    if(!newEmail){
        showFlash('Please enter a valid email.', 'danger');
        btn.disabled = false; btn.textContent = 'Update Email';
        return;
    }
    fetch('{{ url_for("change_otp_email") }}', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: newEmail})
    })
    .then(res => res.json())
    .then(data => {
        showFlash(data.msg || 'Email updated!', data.ok ? 'success' : 'danger');
        modal.style.display = 'none';
        btn.disabled = false; btn.textContent = 'Update Email';
    })
    .catch(() => {
        showFlash('Failed to update email.', 'danger');
        btn.disabled = false; btn.textContent = 'Update Email';
    });
});
document.getElementById('goBackBtn').addEventListener('click', () => window.history.back());
</script>
</body>
</html>
