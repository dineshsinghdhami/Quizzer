<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/reset_password.css">
<script src="/static/js/reset_password.js">
</script>
</head>

<body>
<div class="bg-pattern"></div>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="flash flash-{{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

<div class="container">
  <span class="qz-logo auth-logo"><i class="fas fa-shapes"></i> Quizzer</span>
  <h2>Reset Password</h2>
  <p class="auth-sub">Choose a new password for your account.</p>

  <form method="POST">
    <div class="input-group">
      <input type="password" name="password" placeholder="New Password" required>
      <button type="button" class="toggle-password"><i class="fa fa-eye"></i></button>
    </div>
    <div class="input-group">
      <input type="password" name="confirm_password" placeholder="Confirm Password" required>
      <button type="button" class="toggle-password"><i class="fa fa-eye"></i></button>
    </div>
    <button type="submit" class="submit-btn"><i class="fas fa-check"></i> Submit</button>
  </form>
</div>
</body>
</html>
